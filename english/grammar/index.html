<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="English Grammar Flashcards — Bite-sized grammar from A1 to C1 in flashcard format.">
    <title>Grammar Flashcards — Brain Gym</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="../../icon/brain-14-svgrepo-com.svg">
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="top-bar">
            <a href="../index.html" class="back-link">← English</a>
            <h1 class="page-title">Grammar Flashcards</h1>
        </header>

        <!-- Level Grid View -->
        <div class="view" id="level-view">
            <section class="level-hero">
                <div class="hero-emoji">
                    <img src="../../icon/spell-check-svgrepo-com.svg" alt="Grammar" width="48" height="48">
                </div>
                <h2>Choose Your Level</h2>
                <p>Tap a level to start reviewing grammar flashcards.</p>
            </section>
            <div class="level-grid" id="level-grid">
                <!-- Level cards injected by JS -->
            </div>
        </div>

        <!-- Flashcard View -->
        <div class="view hidden" id="flashcard-view">
            <div class="fc-header">
                <button class="back-btn" id="back-to-levels">
                    <img class="back-icon" src="../../icon/history-svg.svg" alt="" width="18" height="18"
                        aria-hidden="true">
                    Back to Levels
                </button>
                <div class="fc-meta">
                    <span class="fc-level-badge" id="fc-level-badge">A1</span>
                    <span class="fc-counter" id="fc-counter">1 / 10</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="fc-progress">
                <div class="fc-progress-fill" id="fc-progress-fill"></div>
            </div>

            <!-- Flashcard -->
            <div class="fc-stage">
                <div class="flashcard" id="flashcard">
                    <div class="fc-front" id="fc-front">
                        <div class="fc-topic" id="fc-topic">Topic</div>
                        <div class="fc-instruction">Tap to reveal</div>
                    </div>
                    <div class="fc-back" id="fc-back">
                        <div class="fc-explanation" id="fc-explanation">Explanation</div>
                        <div class="fc-example" id="fc-example">Example</div>
                        <div class="fc-tip" id="fc-tip"><img src="../../icon/brain-14-svgrepo-com.svg" alt="" width="16"
                                height="16" class="inline-icon">Tip</div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="fc-controls">
                <button class="fc-btn" id="fc-prev" aria-label="Previous card">
                    <img class="nav-icon" src="../../icon/minus.svg" alt="" width="20" height="20" aria-hidden="true">
                </button>
                <button class="fc-btn fc-flip-btn" id="fc-flip">Flip</button>
                <button class="fc-btn fc-shuffle-btn" id="fc-shuffle">Shuffle</button>
                <button class="fc-btn" id="fc-next" aria-label="Next card">
                    <img class="nav-icon" src="../../icon/plus.svg" alt="" width="20" height="20" aria-hidden="true">
                </button>
            </div>
        </div>
    </div>

    <script src="../../guard.js?v=20260311"></script>
    <script src="../../gamification.js"></script>
    <script src="../../module-state.js"></script>
    <script src="../../review-queue.js"></script>
    <script src="app.js"></script>
</body>

</html>
